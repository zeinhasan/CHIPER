# ============================================================
# CHIPER + SearXNG — All-in-One Docker Compose
# ============================================================
#
# Usage:
#   docker compose up -d --build
#
# Services:
#   - doh-proxy → DNS-over-HTTPS proxy (bypass ISP hijacking)
#   - searxng   → SearXNG search engine (port 8081)
#   - chiper    → CHIPER API middleware (port 8000)
# ============================================================

services:
  # ── DNS-over-HTTPS Proxy ───────────────────────────────────────
  # Bypasses Indonesian ISP DNS hijacking (Internet Positif).
  # Forwards all DNS queries over encrypted HTTPS to Cloudflare/Google.
  doh-proxy:
    image: adguard/dnsproxy:latest
    container_name: doh-proxy
    restart: unless-stopped
    command:
      - "--listen=0.0.0.0"
      - "--port=53"
      - "--upstream=https://dns.cloudflare.com/dns-query"
      - "--upstream=https://dns.google/dns-query"
    networks:
      chiper-net:
        ipv4_address: 172.28.0.100

  # ── SearXNG Search Engine ──────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    dns:
      - 172.28.0.100
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - chiper-net

  # ── CHIPER API Middleware ──────────────────────────────────────
  chiper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chiper
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    dns:
      - 172.28.0.100
    depends_on:
      - searxng
    networks:
      - chiper-net

networks:
  chiper-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
