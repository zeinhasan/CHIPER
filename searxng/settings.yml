use_default_settings: true

general:
  debug: false
  instance_name: "CHIPER SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json

server:
  secret_key: "chiper-searxng-secret-change-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  base_url: http://localhost:8081/
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

redis:
  url: false

# Engine Management
# Disabled: google, brave, startpage, bing, qwant
# Enabled:  duckduckgo, wikipedia, wikidata
engines:
  - name: google
    disabled: true
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: bing
    disabled: true
  - name: qwant
    disabled: true
  - name: duckduckgo
    disabled: false
  - name: wikipedia
    disabled: false
  - name: wikidata
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 10
  pool_maxsize: 10
